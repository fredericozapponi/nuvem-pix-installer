## Nuvem PIX — EMQX para PRODUÇÃO (v1: MQTT 1883 + auth/ACL via backend).
## O instalador gera emqx.runtime.conf a partir deste arquivo, trocando <EMQX_AUTH_TOKEN>.
## (TLS/MQTTS na 8883 fica para a etapa de endurecimento das placas.)

## Não permite conexões anônimas: todo cliente passa pelo authenticator HTTP.
allow_anonymous = false

## --- Autenticação via HTTP (o EMQX chama o backend) ---
authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://backend:8080/internal/emqx/auth"
    headers {
      "content-type" = "application/json"
      "X-EMQX-Token" = "<EMQX_AUTH_TOKEN>"
    }
    body {
      clientid = "${clientid}"
      username = "${username}"
      password = "${password}"
    }
  }
]

## --- Autorização (ACL) via HTTP: cada device só acessa vending/{seu_id}/# ---
authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = http
      method = post
      url = "http://backend:8080/internal/emqx/acl"
      headers {
        "content-type" = "application/json"
        "X-EMQX-Token" = "<EMQX_AUTH_TOKEN>"
      }
      body {
        clientid = "${clientid}"
        username = "${username}"
        topic = "${topic}"
        action = "${action}"
      }
    }
  ]
}
