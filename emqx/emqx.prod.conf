## Nuvem PIX — EMQX produção (config COMPLETA: substitui o emqx.conf, então precisa do node + listener).
## O instalador gera emqx.runtime.conf trocando <EMQX_AUTH_TOKEN>.

node {
  name = "emqx@127.0.0.1"
  cookie = "<EMQX_AUTH_TOKEN>"
  data_dir = "/opt/emqx/data"
}

## Listener MQTT das placas (1883).
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 100000
}

## --- Autenticação via HTTP: o EMQX chama o backend ---
authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://backend:8080/internal/emqx/auth"
    headers {
      "content-type" = "application/json"
      "X-EMQX-Token" = "<EMQX_AUTH_TOKEN>"
    }
    body {
      clientid = "${clientid}"
      username = "${username}"
      password = "${password}"
    }
  }
]

## --- Autorização (ACL) via HTTP: cada device só acessa vending/{seu_id}/# ---
## no_match = deny garante que conexões sem credencial válida não passam (sem anônimo).
authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = http
      method = post
      url = "http://backend:8080/internal/emqx/acl"
      headers {
        "content-type" = "application/json"
        "X-EMQX-Token" = "<EMQX_AUTH_TOKEN>"
      }
      body {
        clientid = "${clientid}"
        username = "${username}"
        topic = "${topic}"
        action = "${action}"
      }
    }
  ]
}
